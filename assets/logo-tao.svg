<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none">
  <!-- Logo TAO : symbole renard + wordmark -->

  <!-- Symbole renard (tete simplifiee) -->
  <g transform="translate(0, 2)">
    <!-- Oreilles -->
    <path d="M8 15 L3 2 L13 10" stroke="#3DFF70" stroke-width="1.5" fill="none"/>
    <path d="M28 15 L33 2 L23 10" stroke="#3DFF70" stroke-width="1.5" fill="none"/>
    <!-- Tete -->
    <path d="M8 14 Q8 8 18 6 Q28 8 28 14 L28 24 Q28 30 18 31 Q8 30 8 24 Z"
          stroke="#3DFF70" stroke-width="1.5" fill="none"/>
    <!-- Yeux -->
    <circle cx="13" cy="18" r="2.5" fill="#3DFF70"/>
    <circle cx="23" cy="18" r="2.5" fill="#3DFF70"/>
    <!-- Nez -->
    <circle cx="18" cy="23" r="1.2" fill="#3DFF70"/>
  </g>

  <!-- Wordmark TAO -->
  <text x="46" y="30" font-family="Orbitron, sans-serif" font-weight="800"
        font-size="26" fill="#F5F5F0" letter-spacing="-0.02em">TAO</text>
</svg>
