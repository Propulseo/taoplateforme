<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Tao — Think · Act · Organize</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <!-- Styles Tao -->
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/pages/aujourdhui.css">
  <link rel="stylesheet" href="styles/pages/chat.css">
  <link rel="stylesheet" href="styles/pages/todo.css">
  <link rel="stylesheet" href="styles/pages/semaine.css">
  <link rel="stylesheet" href="styles/pages/trimestre.css">
  <link rel="stylesheet" href="styles/pages/bilan.css">

<body>

<div class="app">

  <!-- ════════════════════════════════════════
       SIDEBAR
       ════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-logo">
      <img src="assets/logo-symbol.svg" alt="Tao" class="logo-symbol">
      <span class="logo-wordmark">TAO</span>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-nav-item active" data-page="aujourdhui">
        <i><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg></i>
        <span>Aujourd'hui</span>
      </div>
      <div class="sidebar-nav-item" data-page="chat">
        <i><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg></i>
        <span>Chat</span>
      </div>
      <div class="sidebar-nav-item" data-page="todo">
        <i><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="6" height="6" rx="1"/><path d="m3 17 2 2 4-4"/><line x1="13" y1="8" x2="21" y2="8"/><line x1="13" y1="19" x2="21" y2="19"/></svg></i>
        <span>Todo</span>
      </div>
      <div class="sidebar-nav-item" data-page="semaine">
        <i><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></i>
        <span>Calendrier</span>
      </div>
      <div class="sidebar-nav-item" data-page="trimestre">
        <i><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></i>
        <span>Trimestre</span>
      </div>
      <div class="sidebar-nav-item" data-page="bilan">
        <i><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></i>
        <span>Bilan</span>
      </div>
      <div class="sidebar-nav-item" data-page="recompenses">
        <i><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></svg></i>
        <span>Recompenses</span>
      </div>
      <div class="sidebar-nav-item" data-page="reglages">
        <i><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></i>
        <span>Reglages</span>
      </div>
    </nav>

    <button class="sidebar-toggle" title="Replier la sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
    </button>

    <div class="sidebar-user">
      <div class="sidebar-user-avatar">E</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name">Etienne</div>
        <div class="sidebar-user-plan">PRO</div>
      </div>
    </div>

  </aside>

  <!-- ════════════════════════════════════════
       MAIN WRAPPER
       ════════════════════════════════════════ -->
  <div class="main-wrapper">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <button class="header-mobile-toggle" style="display:none">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h2 class="header-page-title">Aujourd'hui</h2>
      </div>
      <div class="header-right">
        <div class="header-coins" data-page="recompenses" onclick="navigateTo('recompenses')">
          <svg class="header-coins-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></svg>
          <span class="header-coins-value">1,247</span>
          <span class="header-coins-label">COINS</span>
        </div>
        <div class="header-level">Niv. 4</div>
        <div class="header-avatar" title="Etienne">E</div>
      </div>
    </header>

    <!-- ── Contenu principal ── -->
    <main class="main-content">
      <section id="page-aujourdhui" class="page-section active"></section>
      <section id="page-chat" class="page-section"></section>
      <section id="page-todo" class="page-section"></section>
      <section id="page-semaine" class="page-section"></section>
      <section id="page-trimestre" class="page-section"></section>
      <section id="page-bilan" class="page-section"></section>
      <section id="page-recompenses" class="page-section"></section>
      <section id="page-reglages" class="page-section"></section>
    </main>
  </div>

  <!-- ════════════════════════════════════════
       BOTTOM NAV (mobile)
       ════════════════════════════════════════ -->
  <nav class="bottom-nav">
    <div class="bottom-nav-items">
      <div class="bottom-nav-item active" data-page="aujourdhui">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <span>Aujourd'hui</span>
      </div>
      <div class="bottom-nav-item" data-page="semaine">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Calendrier</span>
      </div>
      <div class="bottom-nav-item" data-page="chat">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
        <span>Chat</span>
      </div>
      <div class="bottom-nav-item" data-page="recompenses">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></svg>
        <span>Coins</span>
      </div>
      <div class="bottom-nav-item" data-page="plus">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        <span>Plus</span>
      </div>
    </div>
  </nav>

</div>

<!-- Modal: Ajouter todo -->
<div class="modal-overlay todo-modal-quickadd" id="modal-add-todo">
  <div class="modal">
    <div class="modal-header">
      <h3>Ajouter une tache</h3>
      <button class="modal-close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <input type="text" class="todo-quickadd-input" placeholder="Que veux-tu noter ?" autofocus>
    <div class="todo-quickadd-row">
      <span class="todo-quickadd-row-label">Quand</span>
      <button class="todo-quickadd-chip selected">Aujourd'hui</button>
      <button class="todo-quickadd-chip">Demain</button>
      <button class="todo-quickadd-chip">Cette semaine</button>
      <button class="todo-quickadd-chip">Date...</button>
    </div>
    <div class="todo-quickadd-row">
      <span class="todo-quickadd-row-label">Pilier</span>
      <button class="todo-quickadd-chip selected">Taff</button>
      <button class="todo-quickadd-chip">Vie</button>
      <button class="todo-quickadd-chip">Perso</button>
    </div>
    <div class="todo-quickadd-row">
      <span class="todo-quickadd-row-label">Projet</span>
      <button class="todo-quickadd-chip selected">Aucun</button>
      <button class="todo-quickadd-chip">Lancement Tao</button>
      <button class="todo-quickadd-chip">Voyage Lisbonne</button>
      <button class="todo-quickadd-chip">Coaching sport</button>
    </div>
    <div class="todo-quickadd-actions">
      <button class="btn-ghost modal-close">Annuler</button>
      <button class="btn-primary">Ajouter &rarr;</button>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="js/mock-data.js"></script>
<script src="js/events.js"></script>
<script src="components/toast.js"></script>

<script src="components/onboarding.js"></script>
<script src="js/tao-responses.js"></script>
<script src="js/messages-tao.js"></script>
<script src="js/main.js"></script>
<script src="js/ux-enhancements.js"></script>

</body>
</html>
